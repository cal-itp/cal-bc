{% load static tailwind_cli django_htmx %}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100 dark:bg-dds-teal-950">
<head>
    <title>{% block title %}Cal-B/C{% endblock %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% tailwind_css %}
    {% htmx_script %}
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" async type="module"></script>
</head>

<body class="h-full" hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>
    {% block main %}{% endblock %}
</body>
</html>
