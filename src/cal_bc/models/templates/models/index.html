<div>
{% for model in object_list %}
  <ul>
    <li>
      {% with model.latest_version as version %}
      <form method="post" action="{% url 'model_project_new' model.id version.id %}">
        {% csrf_token %}
        <button type="submit">{{ version }}</button>
      </form>
      {% endwith %}
    </li>
  </ul>
{% endfor %}
</div>
